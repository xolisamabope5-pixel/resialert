<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ResiAlert Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .type {
            font-weight: bold;
            color: #e74c3c;
        }

        .room {
            color: #2980b9;
        }

        .empty {
            text-align: center;
            color: gray;
            margin-top: 50px;
        }

        a {
            color: white;
            float: right;
            margin-right: 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="header">
    ResiAlert Dashboard
    <a href="/logout">Logout</a>
</div>

<div class="container">

    {% if issues and issues|length > 0 %}

        {% for issue in issues %}
        <div class="card">
            <div class="room">Room: {{ issue.room }}</div>
            <div class="type">Issue: {{ issue.type }}</div>
        </div>
        {% endfor %}

    {% else %}
        <div class="empty">
            No issues reported yet.
        </div>
    {% endif %}

</div>

</body>
</html>
